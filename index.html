<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cool Summer! 여름휴가 여행지 추천 & 커뮤니티</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Firebase Web SDK (Compat 버전) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>

  <style>
    body {
      background: linear-gradient(135deg, #0d9488 0%, #0284c7 50%, #0369a1 100%);
    }
  </style>
</head>
<body class="min-h-screen text-slate-800 font-sans flex flex-col items-center justify-start p-4 py-10 space-y-8">

  <!-- 1. AI 여행지 추천 메인 카드 -->
  <main class="w-full max-w-2xl bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl overflow-hidden border border-white/20 p-6 md:p-10">
    
    <header class="text-center mb-8">
      <span class="inline-block px-3 py-1 bg-cyan-100 text-cyan-700 font-semibold text-xs rounded-full mb-3 tracking-wider uppercase">
        🌊 Cool Summer Escape
      </span>
      <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight">
        여름휴가 여행지 추천
      </h1>
      <p class="text-slate-600 mt-2 text-sm md:text-base">
        떠나고 싶은 분위기나 키워드를 입력해보세요! 시원한 일정을 만들어 드려요.
      </p>
    </header>

    <!-- 입력 폼 -->
    <section class="space-y-4">
      <div class="relative">
        <input 
          type="text" 
          id="destinationInput" 
          placeholder="예: 발리, 제주도, 바다가 가까운 시원한 계곡, 도쿄..." 
          class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:bg-white text-slate-800 transition-all placeholder:text-slate-400"
          onkeydown="if(event.key==='Enter') getRecommendation()"
        />
      </div>

      <button 
        onclick="getRecommendation()" 
        id="submitBtn"
        class="w-full py-4 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-cyan-500/30 transition-all transform active:scale-[0.99] flex items-center justify-center gap-2"
      >
        <span>🏖️ 시원한 여름휴가 추천받기</span>
      </button>
    </section>

    <!-- 로딩 스피너 -->
    <div id="loading" class="hidden mt-8 text-center py-6">
      <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-cyan-500 border-t-transparent"></div>
      <p class="text-cyan-700 font-medium mt-3 animate-pulse">Gemini가 완벽한 여름휴가 일정을 짜고 있어요...</p>
    </div>

    <!-- 결과 요약 카드 -->
    <section id="resultSummaryCard" class="hidden mt-8 p-6 bg-cyan-50/80 rounded-2xl border border-cyan-100 text-center">
      <div class="text-4xl mb-2">✈️</div>
      <h2 class="text-xl font-bold text-slate-900 mb-2">맞춤 여행 일정이 완성되었습니다!</h2>
      <p class="text-slate-600 text-sm mb-6">아래 버튼을 눌러 시원한 여름휴가 추천 일정을 확인해 보세요.</p>
      
      <button 
        onclick="toggleModal(true)"
        class="px-6 py-3 bg-cyan-600 hover:bg-cyan-700 text-white font-semibold rounded-xl shadow-md transition-all flex items-center justify-center gap-2 mx-auto"
      >
        <span>🗺️ 추천 일정 상세 확인하기</span>
      </button>
    </section>

  </main>

  <!-- 2. Firestore 저장 및 게시판 영역 -->
  <section class="w-full max-w-2xl bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl border border-white/20 p-6 md:p-10 space-y-6">
    <div class="border-b border-slate-100 pb-4">
      <h2 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
        💬 여행 후기 & 이야기 나누기
      </h2>
      <p class="text-slate-500 text-sm mt-1">Firestore에 바로 저장되는 실시간 게시판입니다.</p>
    </div>

    <!-- 글 작성 입력폼 -->
    <div class="space-y-3">
      <textarea 
        id="postContent" 
        rows="3" 
        placeholder="여행 소감이나 공유하고 싶은 나만의 여름휴가 팁을 남겨보세요!" 
        class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:bg-white text-slate-800 transition-all placeholder:text-slate-400 resize-none"
      ></textarea>
      
      <div class="flex justify-end">
        <button 
          onclick="addPost()" 
          id="savePostBtn"
          class="px-6 py-3 bg-slate-900 hover:bg-slate-800 text-white font-semibold rounded-xl shadow-md transition-all active:scale-[0.98] flex items-center gap-2"
        >
          <span>✍️ 등록하기</span>
        </button>
      </div>
    </div>

    <!-- 게시글 목록 영역 -->
    <div class="space-y-4 pt-2">
      <h3 class="text-lg font-semibold text-slate-800 flex items-center gap-2">
        📌 등록된 글 목록
      </h3>
      
      <div id="postsList" class="space-y-3">
        <div class="text-center py-8 text-slate-400 text-sm">
          글을 불러오는 중입니다...
        </div>
      </div>
    </div>
  </section>

  <!-- 추천 일정 모달 팝업 -->
  <div id="scheduleModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl max-w-2xl w-full max-h-[85vh] flex flex-col shadow-2xl overflow-hidden">
      
      <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-cyan-50">
        <h3 class="text-lg font-bold text-cyan-900 flex items-center gap-2">
          🏖️ 맞춤 추천 여행 일정
        </h3>
        <button onclick="toggleModal(false)" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>

      <div id="modalContent" class="p-6 overflow-y-auto space-y-4 text-slate-700 leading-relaxed prose prose-cyan max-w-none">
      </div>

      <div class="p-4 border-t border-slate-100 bg-slate-50 flex justify-end">
        <button 
          onclick="toggleModal(false)"
          class="px-5 py-2.5 bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold rounded-xl transition-all"
        >
          닫기
        </button>
      </div>

    </div>
  </div>

  <script>
    // 웹 설정값 (firebaseConfig)
    const firebaseConfig = {
      apiKey: "AIzaSyBNCqN0kpsBTeY7aXwgfyTqezFHjiJKkec",
      authDomain: "test-71963.firebaseapp.com",
      projectId: "test-71963",
      storageBucket: "test-71963.firebasestorage.app",
      messagingSenderId: "896818388682",
      appId: "1:896818388682:web:3f2e0f73c0869275efde33",
      measurementId: "G-92H20P1NRS"
    };

    // Firebase 및 Firestore 초기화
    firebase.initializeApp(firebaseConfig);
    firebase.analytics();
    const db = firebase.firestore();

    // 페이지 진입 시 Firestore 글 불러오기
    window.addEventListener('DOMContentLoaded', () => {
      loadPosts();
    });

    // Firestore에 글 저장
    async function addPost() {
      const contentInput = document.getElementById('postContent');
      const content = contentInput.value.trim();

      if (!content) {
        alert('내용을 입력해주세요!');
        return;
      }

      const saveBtn = document.getElementById('savePostBtn');
      saveBtn.disabled = true;
      saveBtn.innerText = '저장 중...';

      try {
        await db.collection('posts').add({
          content: content,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        contentInput.value = '';
        loadPosts();
      } catch (error) {
        console.error('Firestore 저장 에러:', error);
        alert('글 저장 중 오류가 발생했습니다.');
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = '✍️ 등록하기';
      }
    }

    // Firestore에서 최신순으로 글 불러오기
    function loadPosts() {
      const postsList = document.getElementById('postsList');

      db.collection('posts')
        .orderBy('createdAt', 'desc')
        .onSnapshot((snapshot) => {
          if (snapshot.empty) {
            postsList.innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">등록된 글이 없습니다. 첫 글을 작성해 보세요!</div>';
            return;
          }

          let html = '';
          snapshot.forEach((doc) => {
            const data = doc.data();
            const dateStr = data.createdAt ? new Date(data.createdAt.toDate()).toLocaleString('ko-KR') : '방금 전';

            html += `
              <div class="p-4 bg-slate-50 hover:bg-slate-100/80 rounded-2xl border border-slate-200/80 transition-all space-y-2">
                <p class="text-slate-800 whitespace-pre-wrap leading-relaxed">${escapeHtml(data.content)}</p>
                <div class="text-xs text-slate-400 text-right">${dateStr}</div>
              </div>
            `;
          });

          postsList.innerHTML = html;
        }, (error) => {
          console.error('Firestore 불러오기 에러:', error);
          postsList.innerHTML = '<div class="text-center py-6 text-rose-500 text-sm">글 목록을 불러오는 도중 오류가 발생했습니다.</div>';
        });
    }

    // HTML 이스케이프
    function escapeHtml(str) {
      if (!str) return '';
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // Gemini API 호출 함수 (api/generate.js 서버리스 엔드포인트)
    async function getRecommendation() {
      const input = document.getElementById('destinationInput').value.trim();
      if (!input) {
        alert('여행지나 원하시는 분위기를 입력해주세요!');
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      const loading = document.getElementById('loading');
      const resultSummaryCard = document.getElementById('resultSummaryCard');

      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-50');
      loading.classList.remove('hidden');
      resultSummaryCard.classList.add('hidden');

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ destination: input })
        });

        const data = await response.json();

        if (response.ok) {
          document.getElementById('modalContent').innerHTML = marked.parse(data.result);
          resultSummaryCard.classList.remove('hidden');
        } else {
          alert(data.error || '오류가 발생했습니다.');
        }
      } catch (err) {
        console.error(err);
        alert('서버와 통신하는 도중 오류가 발생했습니다.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-50');
        loading.classList.add('hidden');
      }
    }

    function toggleModal(show) {
      const modal = document.getElementById('scheduleModal');
      if (show) {
        modal.classList.remove('hidden');
      } else {
        modal.classList.add('hidden');
      }
    }
  </script>

</body>
</html>
